name: time_tracker
description: "A time tracking application for organizations"
publish_to: "none"
version: 1.0.12+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  cloud_functions: ^5.2.0

  # Local Storage
  shared_preferences: ^2.3.4

  # State Management
  provider: ^6.1.2

  # UI Components
  google_fonts: ^6.2.1
  table_calendar: ^3.1.3
  fl_chart: ^0.69.2

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  package_info_plus: ^8.1.3
  url_launcher: ^6.3.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  rxdart: ^0.27.7

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.3
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/clickup.png
    - assets/jira.png
