<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Time Tracker - Track and manage your time efficiently">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Time Tracker">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  
  <!-- Theme color for browser -->
  <meta name="theme-color" content="#0A1628">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Time Tracker</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Loading screen styles matching app theme */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      background: linear-gradient(135deg, #0A1628 0%, #0D1B2A 50%, #1B263B 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .app-icon {
      width: 64px;
      height: 64px;
      background: rgba(0, 217, 255, 0.1);
      border-radius: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      animation: pulse 2s ease-in-out infinite;
    }

    .app-icon svg {
      width: 36px;
      height: 36px;
      fill: #00D9FF;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0, 217, 255, 0.1);
      border-top-color: #00D9FF;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-text {
      color: #94A3B8;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.05);
        opacity: 0.8;
      }
    }

    /* Hide loader when Flutter is ready */
    .flutter-loaded .loading-container {
      display: none;
    }
  </style>
</head>
<body>
  <!-- Loading indicator shown while Flutter initializes -->
  <div class="loading-container" id="loading">
    <div class="app-icon">
      <!-- Clock/Time icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.2 3.2.8-1.3-4.5-2.7V7z"/>
      </svg>
    </div>
    <div class="spinner"></div>
    <div class="loading-text">Loading...</div>
  </div>

  <script>
    // Remove loading indicator when Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      const loading = document.getElementById('loading');
      if (loading) {
        loading.style.opacity = '0';
        loading.style.transition = 'opacity 0.3s ease-out';
        setTimeout(() => {
          loading.style.display = 'none';
        }, 300);
      }
      document.body.classList.add('flutter-loaded');
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
